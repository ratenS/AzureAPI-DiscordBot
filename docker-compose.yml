services:
  azure-discord-postgres:
    image: pgvector/pgvector:pg16
    container_name: azure-discord-postgres
    environment:
      POSTGRES_DB: azure_discord_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d azure_discord_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  azure-discord-bot:
    image: ghcr.io/ratenS/azureapi-discordbot:latest
    container_name: azure-discord-bot
    env_file:
      - .env
    depends_on:
      azure-discord-postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
